<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <script>
        (function () {
            // زبان مرورگر
            const lang = (navigator.language || navigator.userLanguage || "").toLowerCase();

            // اگر فارسی بود
            if (lang.startsWith("fa")) {
                window.location.replace("/fa/");
            } else {
                // همه زبان‌های دیگر
                window.location.replace("/en/");
            }
        })();
    </script>

    <noscript>
        <meta http-equiv="refresh" content="0; url=/en/">
    </noscript>
</head>

<body>
    <p style="font-family:Arial;text-align:center;margin-top:100px;">
        Redirecting...
    </p>
</body>
</html>
